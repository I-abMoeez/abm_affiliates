{% extends "base.html" %}

{% block title %}Admin Login — LensDesk{% endblock %}

{% block content %}
<div style="max-width:420px;margin:3rem auto;">
  <div class="liquid-glass" style="padding:2rem;border-radius:16px;">
    <h1 style="margin:0 0 1rem 0;">Admin Login</h1>
    <p style="color:rgba(255,255,255,0.6);margin-top:-0.5rem;">
      Sign in to manage products & view analytics.
    </p>

    {% if error %}
      <p style="color:#ff8080;margin:1rem 0;">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/admin/login" style="display:flex;flex-direction:column;gap:0.75rem; margin-top:1.25rem;">
      <label style="display:flex;flex-direction:column;gap:0.35rem;">
        Email
        <input type="email" name="email" required value="{{ admin_email }}" />
      </label>

      <label style="display:flex;flex-direction:column;gap:0.35rem;">
        Password
        <input type="password" name="password" required />
      </label>

      <button type="submit" class="btn-primary" style="margin-top:0.5rem;">Login</button>
    </form>

    <div style="margin-top:1.25rem; color:rgba(255,255,255,0.7);">
      <a href="/admin/signup" style="color:rgba(255,255,255,0.95); text-decoration:underline;">Sign up</a>
      &nbsp;•&nbsp;
      <a href="/admin/forgot" style="color:rgba(255,255,255,0.95); text-decoration:underline;">Forgot password</a>
    </div>
  </div>
</div>
{% endblock %}
