{% extends "base.html" %}

{% block title %}Admin Product Form — LensDesk{% endblock %}

{% block content %}
<div style="max-width:880px;margin:2rem auto;">
  <div class="liquid-glass" style="padding:1.5rem;border-radius:16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;">
      <div>
        <h1 style="margin:0;">{% if item %}Edit{% else %}New{% endif %} Product</h1>
        <p style="color:rgba(255,255,255,0.6);margin:0.25rem 0 0 0;">Manage affiliate product details</p>
      </div>
      <div style="display:flex;gap:0.75rem;align-items:center;">
        <a class="btn-secondary liquid-glass" href="/admin/products" style="text-decoration:none;">Back</a>
      </div>
    </div>

    {% if error %}
      <p style="color:#ff8080;margin:1rem 0 0 0;">{{ error }}</p>
    {% endif %}

    <form method="POST" style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.25rem;">
      <label style="display:flex;flex-direction:column;gap:0.35rem;">
        Name
        <input name="name" required value="{{ item.name if item else '' }}" />
      </label>

      <label style="display:flex;flex-direction:column;gap:0.35rem;">
        Category
        <input name="category" value="{{ item.category if item else '' }}" />
      </label>

      <label style="display:flex;flex-direction:column;gap:0.35rem;">
        Store
        <select name="store" style="padding:0.5rem;border-radius:8px;background:rgba(255,255,255,0.05);color:#fff;border:1px solid rgba(255,255,255,0.12);outline:none;">
          <option value="amazon" {% if item and item.store == 'amazon' %}selected{% endif %}>Amazon</option>
          <option value="daraz" {% if item and item.store == 'daraz' %}selected{% endif %}>Daraz</option>
        </select>
      </label>

      <label style="display:flex;flex-direction:column;gap:0.35rem;grid-column:1/3;">
        Image URL
        <input name="image_url" required value="{{ item.image_url if item else '' }}" />
      </label>

      <label style="display:flex;flex-direction:column;gap:0.35rem;grid-column:1/3;">
        Affiliate Link
        <input name="affiliate_link" required value="{{ item.affiliate_link if item else '' }}" />
      </label>

      <label style="display:flex;flex-direction:column;gap:0.35rem;grid-column:1/3;">
        Manual Link (optional)
        <input name="manual_url" value="{{ item.manual_url if item else '' }}" placeholder="https://..." />
      </label>

      <label style="display:flex;flex-direction:column;gap:0.35rem;grid-column:1/3;">
        Description
        <textarea name="description" rows="4" required>{{ item.description if item else '' }}</textarea>
      </label>

      <label style="display:flex;flex-direction:column;gap:0.35rem;grid-column:1/3;">
        Category ID (UUID) (optional)
        <input name="category_id" value="{{ item.category_id if item else '' }}" />
      </label>

      <div style="grid-column:1/3;display:flex;gap:0.75rem;justify-content:flex-end;margin-top:0.5rem;">
        <button class="btn-primary" type="submit">Save</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
